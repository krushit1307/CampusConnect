name: "10 Stale Issues"

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - name: Mark and close stale issues
        uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 7

          stale-issue-label: stale

          stale-issue-message: >
            This issue has been inactive for 60 days and has been marked as stale.
            If there is any further activity, it will remain open. Otherwise, it
            will be closed in 7 days.

          close-issue-message: >
            Closing this issue due to prolonged inactivity.
            Feel free to reopen it or create a new issue if needed.

          exempt-issue-labels: pinned,security,keep-open