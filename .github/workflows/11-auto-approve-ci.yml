name: "11 Auto-Approve CI Workflows"

# This workflow automatically approves pending CI workflow runs
# triggered by fork PRs from first-time contributors.
# It eliminates the need for a maintainer to manually click "Approve" in the Actions tab.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  actions: write
  contents: read

jobs:
  auto-approve:
    name: Auto-Approve Pending Workflow Runs
    runs-on: ubuntu-latest
    steps:
      - name: Wait for workflow runs to register
        run: |
          echo "⏳ Waiting 15 seconds for workflow runs to be created..."
          sleep 15

      - name: Approve any pending workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const headSha = context.payload.pull_request.head.sha;
            const prNumber = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            console.log(`\n🔍 Checking for pending workflow runs on PR #${prNumber} (SHA: ${headSha})...`);

            // Fetch all workflow runs for this exact commit SHA
            const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: headSha,
              per_page: 50,
            });

            const pendingRuns = workflow_runs.filter(
              (run) => run.status === 'action_required'
            );

            if (pendingRuns.length === 0) {
              console.log(`✅ No pending workflow runs found for PR #${prNumber}. Nothing to approve.`);
              return;
            }

            console.log(`Found ${pendingRuns.length} workflow run(s) awaiting approval. Approving now...`);

            for (const run of pendingRuns) {
              try {
                await github.rest.actions.approveWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
                console.log(`✅ Approved run: "${run.name}" (ID: ${run.id})`);
              } catch (err) {
                // This can fail if the run was already approved or cancelled
                console.log(`⚠️ Could not approve run "${run.name}" (ID: ${run.id}): ${err.message}`);
              }
            }

            console.log(`\n🚀 Done! ${pendingRuns.length} workflow run(s) approved for PR #${prNumber} by @${author}.`);
