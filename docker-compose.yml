services:
  web:
    build:
      context: .
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    env_file:
      - .env.local

  realtime-proxy:
    build:
      context: ./services/realtime-proxy
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - HOST=0.0.0.0
      - LISTEN_CHANNEL=live_feed_channel
    env_file:
      - .env.local

